// ── Tag color palette ───────────────────────────────────────────────
const TAG_COLORS = {
  dept: ['bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300',
         'bg-teal-100 text-teal-800 dark:bg-teal-900/40 dark:text-teal-300'],
  course: ['bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300',
           'bg-orange-100 text-orange-800 dark:bg-orange-900/40 dark:text-orange-300'],
  spec: ['bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300',
         'bg-indigo-100 text-indigo-800 dark:bg-indigo-900/40 dark:text-indigo-300'],
  lang: ['bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300'],
};
const tagColor = (type, idx=0) => (TAG_COLORS[type] || TAG_COLORS.spec)[idx % (TAG_COLORS[type]||TAG_COLORS.spec).length];

// ── HTML Parser ─────────────────────────────────────────────────────
function parseHTML(htmlStr, filename) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlStr, 'text/html');

  // title
  const title = doc.querySelector('title')?.textContent?.trim() || filename.replace('.html','');

  // Try to extract dict from script tags
  let dictZh = {}, dictEn = {};
  const scripts = doc.querySelectorAll('script[type="text/babel"], script:not([src])');
  let rawScript = '';
  scripts.forEach(s => { rawScript += s.textContent + '\n'; });

  // Extract subtitle / intro from dict
  const extractStr = (key) => {
    const m = rawScript.match(new RegExp(`['"]${key}['"]\\s*:\\s*['"\`]([^'"\`]{1,200})`));
    return m ? m[1].trim() : '';
  };

  const zhTitle = extractStr('title') || title;
  const zhSubtitle = extractStr('subtitle') || extractStr('m0_intro') || '';

  // Detect language support
  const hasBilingual = rawScript.includes("lang==='zh'") || rawScript.includes('dict.zh') || rawScript.includes("dict['zh']");
  const langTag = hasBilingual ? '中英雙語' : (rawScript.includes('zh') ? '中文' : '英文');

  // Detect modules count
  const moduleMatches = rawScript.match(/m\d+_nav/g) || [];
  const moduleCount = Math.max(new Set(moduleMatches).size, 1);

  // Detect features
  const hasAnalytics = rawScript.includes('analytics') || rawScript.includes('Analytics');
  const hasQuiz = rawScript.includes('ModuleQuiz') || rawScript.includes('quiz');
  const hasFlipCard = rawScript.includes('FlipCard') || rawScript.includes('flip');
  const hasTTS = rawScript.includes('speechSynthesis') || rawScript.includes('TTS');
  const hasDark = rawScript.includes('darkMode') || rawScript.includes('dark:');

  // Try to infer dept/course from filename or content
  const deptMatch = filename.match(/([A-Z]{2,6})\d/) || zhTitle.match(/(工|理|文|商|管|社|法|醫|教|資|電|機|化|生)/);
  const dept = deptMatch ? deptMatch[1] : '未分類';

  // Spec tags
  const specs = [];
  if (hasAnalytics) specs.push('Learning Analytics');
  if (hasQuiz) specs.push('測驗');
  if (hasFlipCard) specs.push('翻轉卡');
  if (hasTTS) specs.push('語音導覽');
  if (hasDark) specs.push('深色模式');

  // Infer course category from title keywords
  let courseCategory = '其他';
  const titleLower = (zhTitle + zhSubtitle).toLowerCase();
  if (titleLower.match(/business|管理|商業|行銷|marketing|finance|財務/)) courseCategory = '商管';
  else if (titleLower.match(/engineer|工程|程式|coding|software|系統/)) courseCategory = '工程資訊';
  else if (titleLower.match(/science|科學|化學|物理|生物|biology|chemistry/)) courseCategory = '自然科學';
  else if (titleLower.match(/english|emi|language|語言|writing|communication/)) courseCategory = '語言';
  else if (titleLower.match(/social|社會|政治|法律|history|歷史|文化/)) courseCategory = '人文社科';
  else if (titleLower.match(/ai|machine|learn|深度|neural|模型/)) courseCategory = 'AI/數位';

  return {
    id: Date.now() + Math.random(),
    filename,
    title: zhTitle,
    subtitle: zhSubtitle.slice(0, 80) + (zhSubtitle.length > 80 ? '…' : ''),
    dept,
    courseCategory,
    langTag,
    moduleCount,
    specs,
    hasBilingual,
    hasAnalytics,
    hasQuiz,
    hasTTS,
    blob: new Blob([htmlStr], {type:'text/html'}),
    blobUrl: null,
    uploadedAt: new Date().toLocaleString('zh-TW'),
    // editable fields
    deptLabel: dept,
    courseCategoryLabel: courseCategory,
    authorName: '',
    note: '',
  };
}

// ── Drop Zone ───────────────────────────────────────────────────────
function DropZone({ onFiles }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();
  const handleDrop = e => {
    e.preventDefault(); setDragging(false);
    const files = Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.html'));
    if (files.length) onFiles(files);
  };
  return (
    <div onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)} onDrop={handleDrop}
      className={`border-2 border-dashed rounded-2xl p-10 text-center transition-all cursor-pointer
        ${dragging ? 'drop-zone-active' : 'border-slate-200 dark:border-slate-700 hover:border-[#004030]/40 dark:hover:border-[#D8C3A5]/40'}
        bg-white dark:bg-slate-800`}
      onClick={()=>inputRef.current?.click()}>
      <input ref={inputRef} type="file" accept=".html" multiple className="hidden" onChange={e=>onFiles(Array.from(e.target.files))}/>
      <IconUpload size={40} className="mx-auto mb-4 text-[#004030]/30 dark:text-[#D8C3A5]/30"/>
      <p className="font-serif font-bold text-slate-600 dark:text-slate-300 text-lg mb-1">拖放 HTML 檔案至此</p>
      <p className="text-sm text-slate-400 dark:text-slate-500">或點擊選擇檔案 · 支援多檔同時上傳</p>
      <p className="text-xs text-slate-300 dark:text-slate-600 mt-3">系統將自動解析標題、模組數、功能規格等資訊</p>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────────
function App() {
  const [dark, setDark] = useState(false);
  const [spas, setSpas] = useState([]);
  const [loading, setLoading] = useState(false);
  const [previewSpa, setPreviewSpa] = useState(null);
  const [editSpa, setEditSpa] = useState(null);
  const [search, setSearch] = useState('');
  const [filterDept, setFilterDept] = useState('全部');
  const [filterCourse, setFilterCourse] = useState('全部');
  const [filterSpec, setFilterSpec] = useState('全部');
  const [viewMode, setViewMode] = useState('grid');
  const [showUpload, setShowUpload] = useState(true);
  const [lang, setLang] = useState('zh');

  const t = {
    zh: {
      title: 'EMI SPA 成果展示牆',
      subtitle: 'NTHU EMI 教師增能工作坊 · 2026 年 4 月',
      upload: '上傳更多課程 SPA',
      search_ph: '搜尋課程名稱、教師、院系…',
      all: '全部',
      dept_label: '院系別',
      course_label: '課程類別',
      spec_label: 'SPA 規格',
      count: (n) => `共 ${n} 個課程`,
      empty: '尚無符合條件的課程',
      empty_sub: '請調整篩選條件，或上傳新的 SPA 檔案',
      start: '開始上傳第一個課程 SPA',
    },
    en: {
      title: 'EMI SPA Course Gallery',
      subtitle: 'NTHU EMI Faculty Workshop · April 2026',
      upload: 'Upload More SPA Files',
      search_ph: 'Search by title, instructor, department…',
      all: 'All',
      dept_label: 'Department',
      course_label: 'Category',
      spec_label: 'SPA Spec',
      count: (n) => `${n} courses`,
      empty: 'No matching courses',
      empty_sub: 'Try adjusting your filters or upload new SPA files',
      start: 'Upload your first SPA file to get started',
    }
  }[lang];

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  const handleFiles = useCallback(async (files) => {
    setLoading(true);
    const results = [];
    for (const file of files) {
      const text = await file.text();
      const meta = parseHTML(text, file.name);
      results.push(meta);
    }
    setSpas(prev => [...prev, ...results]);
    setLoading(false);
    setShowUpload(false);
  }, []);

  // Derived filter options
  const allDepts = useMemo(() => ['全部', ...new Set(spas.map(s=>s.deptLabel||'未分類'))], [spas]);
  const allCourses = useMemo(() => ['全部', ...new Set(spas.map(s=>s.courseCategoryLabel||'其他'))], [spas]);
  const allSpecs = useMemo(() => ['全部', ...new Set(spas.flatMap(s=>s.specs))], [spas]);

  const filtered = useMemo(() => spas.filter(s => {
    const q = search.toLowerCase();
    const matchSearch = !q || s.title.toLowerCase().includes(q) || s.authorName.toLowerCase().includes(q) || (s.deptLabel||'').toLowerCase().includes(q);
    const matchDept = filterDept==='全部' || s.deptLabel===filterDept;
    const matchCourse = filterCourse==='全部' || s.courseCategoryLabel===filterCourse;
    const matchSpec = filterSpec==='全部' || s.specs.includes(filterSpec);
    return matchSearch && matchDept && matchCourse && matchSpec;
  }), [spas, search, filterDept, filterCourse, filterSpec]);

  const handleEdit = (id) => setEditSpa(spas.find(s=>s.id===id));
  const handleSaveEdit = (form) => {
    setSpas(prev => prev.map(s => s.id===editSpa.id ? {...s,...form} : s));
    setEditSpa(null);
  };
  const handleRemove = (id) => setSpas(prev => prev.filter(s=>s.id!==id));

  const FilterSelect = ({label, value, onChange, options}) => (
    <div className="flex flex-col gap-1">
      <label className="text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500">{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)}
        className="text-sm border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-1.5 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5] cursor-pointer">
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
    </div>
  );

  return (
    <div className="min-h-screen flex flex-col font-sans">
      {/* Header */}
      <header className="fixed top-0 left-0 right-0 z-50 h-16 bg-[#004030] dark:bg-slate-900 flex items-center justify-between px-4 md:px-8 shadow-lg">
        <div className="flex items-center gap-3">
          <span className="font-serif font-black text-[#D8C3A5] text-xl tracking-widest">EMI</span>
          <span className="hidden sm:block text-[#D8C3A5]/50 text-xs font-light tracking-wider">SPA Gallery</span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')}
            className="text-xs font-bold text-[#D8C3A5]/70 hover:text-[#D8C3A5] px-2 py-1 rounded border border-[#D8C3A5]/20 hover:border-[#D8C3A5]/50 transition">
            {lang==='zh'?'EN':'中'}
          </button>
          <button onClick={()=>setDark(d=>!d)} className="p-2 rounded-lg text-[#D8C3A5]/70 hover:text-[#D8C3A5] hover:bg-white/10 transition">
            {dark ? <IconSun size={18}/> : <IconMoon size={18}/>}
          </button>
          {spas.length > 0 && (
            <button onClick={()=>setShowUpload(u=>!u)}
              className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold bg-[#D8C3A5] text-[#004030] rounded-lg hover:bg-white transition">
              <IconUpload size={14}/> {t.upload}
            </button>
          )}
        </div>
      </header>

      <main className="pt-16 flex-1">
        {/* Hero */}
        <div className="bg-gradient-to-b from-[#004030] to-[#004030]/80 dark:from-slate-900 dark:to-slate-900 px-4 md:px-8 pt-10 pb-8">
          <div className="max-w-5xl mx-auto animate-fade-in">
            <p className="text-[#D8C3A5]/60 text-xs font-semibold uppercase tracking-widest mb-2">NTHU EMI · 2026.04.23</p>
            <h1 className="font-serif font-black text-[#D8C3A5] text-3xl md:text-4xl mb-2">{t.title}</h1>
            <p className="text-[#D8C3A5]/70 text-sm">{t.subtitle}</p>
            {spas.length > 0 && (
              <div className="flex gap-4 mt-4">
                {[
                  {val: spas.length, label: lang==='zh'?'課程 SPA':'Course SPAs'},
                  {val: new Set(spas.map(s=>s.deptLabel)).size, label: lang==='zh'?'院系別':'Departments'},
                  {val: new Set(spas.map(s=>s.courseCategoryLabel)).size, label: lang==='zh'?'課程類別':'Categories'},
                ].map((stat,i) => (
                  <div key={i} className="bg-white/10 rounded-xl px-4 py-2 text-center">
                    <p className="font-serif font-black text-[#D8C3A5] text-2xl">{stat.val}</p>
                    <p className="text-[#D8C3A5]/60 text-xs">{stat.label}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="max-w-5xl mx-auto px-4 md:px-8 py-8">
          {/* Upload area */}
          {(showUpload || spas.length === 0) && (
            <div className="mb-8 animate-fade-in">
              <DropZone onFiles={handleFiles}/>
              {spas.length === 0 && (
                <p className="text-center text-slate-400 dark:text-slate-500 text-sm mt-4">{t.start}</p>
              )}
            </div>
          )}

          {loading && (
            <div className="flex items-center justify-center gap-3 py-8 text-[#004030] dark:text-[#D8C3A5]">
              <div className="w-5 h-5 border-2 border-current border-t-transparent rounded-full animate-spin"/>
              <span className="text-sm font-semibold">解析中…</span>
            </div>
          )}

          {spas.length > 0 && (
            <>
              {/* Filters */}
              <div className="flex flex-wrap gap-4 items-end mb-6 animate-fade-in-delay-1">
                <div className="flex-1 min-w-[200px]">
                  <label className="text-[10px] font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 block mb-1">{lang==='zh'?'搜尋':'Search'}</label>
                  <div className="relative">
                    <IconSearch size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                    <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.search_ph}
                      className="w-full pl-9 pr-3 py-1.5 text-sm border border-slate-200 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5]"/>
                  </div>
                </div>
                <FilterSelect label={t.dept_label} value={filterDept} onChange={setFilterDept} options={allDepts}/>
                <FilterSelect label={t.course_label} value={filterCourse} onChange={setFilterCourse} options={allCourses}/>
                <FilterSelect label={t.spec_label} value={filterSpec} onChange={setFilterSpec} options={allSpecs}/>
                <div className="flex gap-1 items-end pb-0.5">
                  {['grid','list'].map(m => (
                    <button key={m} onClick={()=>setViewMode(m)}
                      className={`p-2 rounded-lg transition ${viewMode===m ? 'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030]' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 border border-slate-200 dark:border-slate-600'}`}>
                      {m==='grid' ? <IconGrid size={16}/> : <IconList size={16}/>}
                    </button>
                  ))}
                </div>
              </div>

              {/* Count */}
              <div className="flex items-center justify-between mb-4 animate-fade-in-delay-2">
                <p className="text-sm text-slate-500 dark:text-slate-400 font-semibold">{t.count(filtered.length)}</p>
                {(filterDept!=='全部'||filterCourse!=='全部'||filterSpec!=='全部'||search) && (
                  <button onClick={()=>{setFilterDept('全部');setFilterCourse('全部');setFilterSpec('全部');setSearch('');}}
                    className="text-xs text-[#004030] dark:text-[#D8C3A5] font-semibold hover:underline flex items-center gap-1">
                    <IconX size={12}/> 清除篩選
                  </button>
                )}
              </div>

              {/* Grid / List */}
              {filtered.length === 0 ? (
                <div className="text-center py-20 animate-fade-in">
                  <p className="font-serif font-bold text-slate-400 dark:text-slate-500 text-xl mb-2">{t.empty}</p>
                  <p className="text-slate-300 dark:text-slate-600 text-sm">{t.empty_sub}</p>
                </div>
              ) : viewMode === 'grid' ? (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 animate-fade-in-delay-3">
                  {filtered.map(spa => (
                    <SPACard key={spa.id} spa={spa} view="grid"
                      onPreview={()=>setPreviewSpa(spa)}
                      onEdit={()=>handleEdit(spa.id)}
                      onRemove={()=>handleRemove(spa.id)}/>
                  ))}
                </div>
              ) : (
                <div className="flex flex-col gap-3 animate-fade-in-delay-3">
                  {filtered.map(spa => (
                    <SPACard key={spa.id} spa={spa} view="list"
                      onPreview={()=>setPreviewSpa(spa)}
                      onEdit={()=>handleEdit(spa.id)}
                      onRemove={()=>handleRemove(spa.id)}/>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      </main>

      {/* Footer */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-xs">Version 2026.04.23 · For Educational Use Only</span>
        <span className="text-[#D8C3A5]/60 text-xs flex items-center gap-1">
          Architect:&nbsp;
          <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo"
            target="_blank" rel="noopener noreferrer"
            className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">
            Prof. Shihmin Lo
          </a>
        </span>
      </footer>

      {/* Modals */}
      {previewSpa && <PreviewModal spa={previewSpa} onClose={()=>setPreviewSpa(null)}/>}
      {editSpa && <EditModal spa={editSpa} onSave={handleSaveEdit} onClose={()=>setEditSpa(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
