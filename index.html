function ttsSpeak(text,lang){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const voices=window.speechSynthesis.getVoices();
  if(lang==='zh'){u.lang='zh-TW';const v=voices.find(v=>/Yating|zh-TW|zh_TW/i.test(v.name+v.lang));if(v)u.voice=v;}
  else{u.lang='en-GB';const v=voices.find(v=>/Daniel|en-GB|en_GB/i.test(v.name+v.lang));if(v)u.voice=v;}
  u.rate=0.9;
  window.speechSynthesis.speak(u);
}
function ttsStop(){window.speechSynthesis&&window.speechSynthesis.cancel();}

function parseHTML(htmlStr,filename){
  const doc=new DOMParser().parseFromString(htmlStr,'text/html');
  const rawTitle=doc.querySelector('title')?.textContent?.trim()||filename.replace(/\.html$/i,'');
  let raw='';doc.querySelectorAll('script').forEach(s=>{raw+=s.textContent+'\n';});
  const str=k=>{const m=raw.match(new RegExp(`['"]${k}['"]\\s*:\\s*['"\`]([^'"\`]{1,220})`));return m?m[1].trim():'';};
  const title=str('title')||rawTitle;
  const subtitle=(str('subtitle')||str('m0_intro')).slice(0,100);
  let author='';
  const am=raw.match(/architect_name['"]\s*:\s*['"]([^'"]{2,60})['"]/);if(am)author=am[1];
  if(!author){const pm=raw.match(/教授[：:]\s*([^\s,，。\n]{2,10})/);if(pm)author=pm[1];}
  if(!author){const pm2=raw.match(/Prof\.?\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)/);if(pm2)author='Prof. '+pm2[1];}
  const hasBilingual=raw.includes("lang==='zh'")||raw.includes('dict.zh');
  const hasAnalytics=raw.includes('analytics')||raw.includes('Analytics');
  const hasQuiz=raw.includes('ModuleQuiz')||raw.includes('quiz');
  const hasFlip=raw.includes('FlipCard');
  const hasTTS=raw.includes('speechSynthesis');
  const hasDark=raw.includes('darkMode')||raw.includes('dark:');
  const hasRWD=raw.includes('sm:')||raw.includes('md:');
  const moduleCount=Math.max(new Set((raw.match(/m\d+_nav/g)||[])).size,1);
  const specs=[];
  if(hasAnalytics)specs.push('Analytics');if(hasQuiz)specs.push(hasBilingual?'測驗':'Quiz');
  if(hasFlip)specs.push(hasBilingual?'翻轉卡':'FlipCard');if(hasTTS)specs.push('TTS');
  if(hasDark)specs.push(hasBilingual?'深色':'Dark');if(hasRWD)specs.push('RWD');
  const hay=(title+subtitle).toLowerCase();
  let cat='其他';
  if(/business|管理|行銷|marketing|finance|財務|ib/.test(hay))cat='商管';
  else if(/engineer|工程|程式|coding|software|資工|電機/.test(hay))cat='工程資訊';
  else if(/science|科學|化|物理|生物|biology|chemistry/.test(hay))cat='自然科學';
  else if(/english|emi|language|語言|writing|communication/.test(hay))cat='語言';
  else if(/social|社會|政治|法律|history|歷史|文化|人文/.test(hay))cat='人文社科';
  else if(/\bai\b|machine|deep|learn|深度|neural|模型|llm|gpt/.test(hay))cat='AI/數位';
  const dm=filename.match(/([A-Z]{2,6})\d/)||title.match(/(工|理|文|商|管|社|法|醫|教|資|電|機|化|生)/);
  const dept=dm?dm[1]:'未分類';
  return{id:Date.now()+Math.random(),filename,title,subtitle,dept,deptLabel:dept,courseCategory:cat,courseCategoryLabel:cat,authorName:author,note:'',moduleCount,specs,hasBilingual,hasAnalytics,hasRWD,blob:new Blob([htmlStr],{type:'text/html'}),uploadedAt:new Date().toLocaleString('zh-TW')};
}

function exportCSV(spas,profile,lang){
  const BOM='\uFEFF';
  const hdr=lang==='zh'?['教師姓名','院系別','課程名稱','備註','上傳時間','SPA標題','模組數','規格']:['Instructor','Department','Course','Notes','Uploaded','SPA Title','Modules','Specs'];
  const rows=spas.map(s=>[profile.name,profile.dept,profile.course,profile.note,s.uploadedAt,s.title,s.moduleCount,s.specs.join(';')]);
  const csv=BOM+[hdr,...rows].map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=`EMI_SPA_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

        {!ok&&<p className="text-xs text-amber-500 mt-3">{t.msg_fill}</p>}
        <div className="flex gap-3 mt-4">
          <button onClick={onClose} className="flex-1 py-2 rounded-lg border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-700 transition">{t.btn_close}</button>
          <button disabled={!ok} onClick={doExport} className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-sm font-semibold transition ${ok?'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] hover:bg-[#002b20]':'bg-slate-100 dark:bg-slate-700 text-slate-400 cursor-not-allowed'}`}>
            {done?<><Ic n="check" size={14}/>{t.msg_exported}</>:<><Ic n="dl" size={14}/>{t.btn_export}</>}
          </button>
        </div>
      </div>
    </div>
  );
}

function SPACard({spa,t,viewMode,onEdit}){
  const ini=(spa.title||'?')[0];
  if(viewMode==='list') return(
    <div className="card-hover bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 flex flex-wrap sm:flex-nowrap items-center gap-3 px-4 py-3 anim min-w-0">
      <div className="w-9 h-9 rounded-lg bg-[#004030]/10 dark:bg-[#D8C3A5]/10 flex items-center justify-center shrink-0">
        <span className="font-serif font-black text-[#004030] dark:text-[#D8C3A5] text-base">{ini}</span>
      </div>
      <div className="flex-1 min-w-0">
        <p className="font-serif font-bold text-slate-800 dark:text-slate-100 text-sm truncate">{spa.title}</p>
        <p className="text-xs text-slate-400 truncate">{spa.authorName||spa.filename}</p>
      </div>
      <div className="flex gap-1.5 flex-wrap shrink-0">
        <span className={`pill ${tc('dept')}`}>{spa.deptLabel||'—'}</span>
        <span className={`pill ${tc('course')}`}>{spa.courseCategoryLabel||'—'}</span>
      </div>
      <div className="flex gap-1 shrink-0">
        <button onClick={onEdit} title={t.btn_edit} className="p-1.5 rounded-lg text-slate-400 hover:text-[#004030] dark:hover:text-[#D8C3A5] hover:bg-slate-100 dark:hover:bg-slate-700 transition"><Ic n="edit" size={14}/></button>
        <button onClick={()=>openTab(spa.blob)} className="flex items-center gap-1 px-3 py-1 text-xs font-bold bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg hover:bg-[#002b20] transition"><Ic n="ext" size={12}/>{t.btn_open}</button>
      </div>
    </div>
  );
  return(
    <div className="card-hover bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden flex flex-col anim">
      <div className="h-28 bg-gradient-to-br from-[#004030] to-[#005040] relative overflow-hidden flex items-center justify-center">
        <div className="absolute inset-0 opacity-10" style={{backgroundImage:'radial-gradient(#D8C3A5 1px,transparent 1px)',backgroundSize:'22px 22px'}}/>
        <span className="font-serif font-black text-[#D8C3A5] text-5xl opacity-20 select-none">{ini}</span>
        <div className="absolute top-2 right-2 flex gap-1">
          {spa.hasBilingual&&<span className="pill bg-white/20 text-white text-[.62rem]">{t.tag_bilingual}</span>}
          {spa.hasAnalytics&&<span className="pill bg-white/20 text-white text-[.62rem]">{t.tag_analytics}</span>}
        </div>
        <div className="absolute bottom-2 left-3 text-[#D8C3A5]/60 text-[10px]">{spa.moduleCount}{t.lbl_modules}</div>
      </div>
      <div className="p-4 flex flex-col flex-1 gap-2">
        <h3 className="font-serif font-bold text-slate-800 dark:text-slate-100 text-sm leading-snug line-clamp-2">{spa.title}</h3>
        {spa.authorName&&<p className="text-xs font-semibold text-[#004030] dark:text-[#D8C3A5] flex items-center gap-1"><Ic n="user" size={11}/>{spa.authorName}</p>}
        {spa.subtitle&&<p className="text-xs text-slate-500 dark:text-slate-400 line-clamp-2 flex-1">{spa.subtitle}</p>}
        <div className="flex flex-wrap gap-1">
          <span className={`pill ${tc('dept')}`}>{spa.deptLabel||'—'}</span>
          <span className={`pill ${tc('course')}`}>{spa.courseCategoryLabel||'—'}</span>
          {spa.specs.slice(0,2).map((s,i)=><span key={i} className={`pill ${tc('spec',i)}`}>{s}</span>)}
        </div>
        <div className="flex gap-2 mt-1">
          <button onClick={onEdit} className="flex items-center gap-1 px-2 py-1 text-xs text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-600 rounded-lg hover:border-[#004030] dark:hover:border-[#D8C3A5] hover:text-[#004030] dark:hover:text-[#D8C3A5] transition"><Ic n="edit" size={12}/>{t.btn_edit}</button>
          <button onClick={()=>openTab(spa.blob)} className="flex-1 flex items-center justify-center gap-1 py-1 text-xs font-bold bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] rounded-lg hover:bg-[#002b20] transition"><Ic n="ext" size={12}/>{t.btn_open}</button>
        </div>
        <p className="text-[10px] text-slate-300 dark:text-slate-600 text-right">{spa.uploadedAt}</p>
      </div>
    </div>
  );
}

function DropZone({t,onFiles}){
  const [drag,setDrag]=useState(false);const ref=useRef();
  const handle=e=>{e.preventDefault();setDrag(false);const f=Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.html'));if(f.length)onFiles(f);};
  return(
    <div onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={handle}
      className={`border-2 border-dashed rounded-2xl p-8 sm:p-12 text-center cursor-pointer transition-all bg-white dark:bg-slate-800 ${drag?'drop-act':'border-slate-200 dark:border-slate-700 hover:border-[#004030]/40 dark:hover:border-[#D8C3A5]/40'}`}
      onClick={()=>ref.current?.click()}>
      <input ref={ref} type="file" accept=".html" multiple className="hidden" onChange={e=>onFiles(Array.from(e.target.files))}/>
      <Ic n="upload" size={36} cls="mx-auto mb-3 text-[#004030]/30 dark:text-[#D8C3A5]/30"/>
      <p className="font-serif font-bold text-slate-600 dark:text-slate-300 text-base sm:text-lg mb-1">{t.drop_h}</p>
      <p className="text-sm text-slate-400 dark:text-slate-500">{t.drop_s}</p>
      <p className="text-xs text-slate-300 dark:text-slate-600 mt-2">{t.drop_hint}</p>
    </div>
  );
}

function Fsel({label,value,onChange,options}){
  return(
    <div className="flex flex-col gap-1">
      <label className="text-[10px] font-bold uppercase tracking-widest text-slate-400">{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)} className="text-sm border border-slate-200 dark:border-slate-600 rounded-lg px-2 py-1.5 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5] cursor-pointer min-w-[82px]">
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
    </div>
  );
}

function App(){
  const [lang,setLang]=useState('zh');
  const [dark,setDark]=useState(false);
  const [spas,setSpas]=useState([]);
  const [loading,setLoading]=useState(false);
  const [editSpa,setEditSpa]=useState(null);
  const [showProfile,setShowProfile]=useState(false);
  const [showUpload,setShowUpload]=useState(true);
  const [search,setSearch]=useState('');
  const [fDept,setFDept]=useState('');
  const [fCourse,setFCourse]=useState('');
  const [fSpec,setFSpec]=useState('');
  const [viewMode,setViewMode]=useState('grid');
  const [speaking,setSpeaking]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const menuRef=useRef();
  const t=DICT[lang];const ALL=t.opt_all;

  useEffect(()=>{document.documentElement.classList.toggle('dark',dark);},[dark]);
  useEffect(()=>{document.documentElement.lang=lang==='zh'?'zh-TW':'en';},[lang]);
  useEffect(()=>{ttsStop();setSpeaking(false);},[lang]);
  useEffect(()=>{
    const h=e=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);

  const handleFiles=useCallback(async files=>{
    setLoading(true);const res=[];
    for(const f of files){const txt=await f.text();res.push(parseHTML(txt,f.name));}
    setSpas(prev=>[...prev,...res]);setLoading(false);setShowUpload(false);
  },[]);

  const allDepts  =useMemo(()=>[ALL,...new Set(spas.map(s=>s.deptLabel||'未分類'))],[spas,ALL]);
  const allCourses=useMemo(()=>[ALL,...new Set(spas.map(s=>s.courseCategoryLabel||'其他'))],[spas,ALL]);
  const allSpecs  =useMemo(()=>[ALL,...new Set(spas.flatMap(s=>s.specs))],[spas,ALL]);
  const filtered=useMemo(()=>spas.filter(s=>{
    const q=search.toLowerCase();
    return(!q||[s.title,s.authorName,s.deptLabel,s.courseCategoryLabel].some(v=>(v||'').toLowerCase().includes(q)))
      &&(!fDept||fDept===ALL||s.deptLabel===fDept)
      &&(!fCourse||fCourse===ALL||s.courseCategoryLabel===fCourse)
      &&(!fSpec||fSpec===ALL||s.specs.includes(fSpec));
  }),[spas,search,fDept,fCourse,fSpec,ALL]);
  const uniqAuthors=useMemo(()=>new Set(spas.map(s=>s.authorName).filter(Boolean)).size,[spas]);

  const handleTTS=()=>{
    if(speaking){ttsStop();setSpeaking(false);return;}
    const parts=[t.tts_welcome,t.tts_stats(spas.length,new Set(spas.map(s=>s.deptLabel)).size,new Set(spas.map(s=>s.courseCategoryLabel)).size,uniqAuthors),filtered.length?t.tts_listing:t.tts_none,...filtered.map(s=>t.tts_card(s))];
    ttsSpeak(parts.join(' '),lang);setSpeaking(true);
    const chk=setInterval(()=>{if(!window.speechSynthesis?.speaking){setSpeaking(false);clearInterval(chk);}},500);
  };

  const scrollTop=()=>window.scrollTo({top:0,behavior:'smooth'});
  const saveEdit=form=>{setSpas(prev=>prev.map(s=>s.id===editSpa.id?{...s,...form}:s));setEditSpa(null);};
  const hasF=(fDept&&fDept!==ALL)||(fCourse&&fCourse!==ALL)||(fSpec&&fSpec!==ALL)||search;

  const navActions=[
    {label:speaking?t.nav_tts_off:t.nav_tts_on,icon:speaking?'volx':'vol',fn:handleTTS,glow:speaking},
    spas.length>0&&{label:t.nav_profile,icon:'user',fn:()=>setShowProfile(true)},
    spas.length>0&&{label:t.nav_upload,icon:'upload',fn:()=>setShowUpload(u=>!u),accent:true},
  ].filter(Boolean);

  return(
    <div className="min-h-screen flex flex-col">
      <header className="fixed top-0 left-0 right-0 z-50 h-16 bg-[#004030] dark:bg-slate-900 flex items-center justify-between px-4 sm:px-6 md:px-8 shadow-lg shrink-0">
        <button onClick={scrollTop} className="flex items-center gap-2 group focus:outline-none">
          <span className="font-serif font-black text-[#D8C3A5] text-xl tracking-widest group-hover:text-white transition">EMI</span>
          <span className="hidden sm:block text-[#D8C3A5]/40 text-xs tracking-wider">SPA Gallery</span>
        </button>
        <div className="hidden sm:flex items-center gap-2">
          {navActions.map((a,i)=>(
            <button key={i} onClick={a.fn} className={`flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-lg border transition ${a.accent?'bg-[#D8C3A5] text-[#004030] border-transparent hover:bg-white':a.glow?'bg-amber-400/20 border-amber-400/40 text-amber-300':'border-[#D8C3A5]/20 text-[#D8C3A5]/70 hover:text-[#D8C3A5] hover:border-[#D8C3A5]/50'}`}>
              <Ic n={a.icon} size={14}/>{a.label}
            </button>
          ))}
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} className="text-xs font-bold text-[#D8C3A5]/70 hover:text-[#D8C3A5] px-2 py-1 rounded border border-[#D8C3A5]/20 hover:border-[#D8C3A5]/50 transition">{t.nav_lang}</button>
          <button onClick={()=>setDark(d=>!d)} className="p-2 rounded-lg text-[#D8C3A5]/70 hover:text-[#D8C3A5] hover:bg-white/10 transition">{dark?<Ic n="sun" size={17}/>:<Ic n="moon" size={17}/>}</button>
        </div>
        <div className="sm:hidden relative" ref={menuRef}>
          <button onClick={()=>setMenuOpen(o=>!o)} className="p-2 text-[#D8C3A5]/80 hover:text-[#D8C3A5]">{menuOpen?<Ic n="x" size={20}/>:<Ic n="menu" size={20}/>}</button>
          {menuOpen&&(
            <div className="absolute right-0 top-full mt-1 w-48 bg-[#004030] dark:bg-slate-800 rounded-xl shadow-2xl border border-white/10 overflow-hidden z-[100] max-h-[calc(100vh-5rem)] overflow-y-auto">
              {[...navActions,{label:`${t.nav_lang} 切換`,fn:()=>{setLang(l=>l==='zh'?'en':'zh');setMenuOpen(false);}},{label:dark?t.nav_light:t.nav_dark,fn:()=>{setDark(d=>!d);setMenuOpen(false);}}].map((a,i)=>(
                <button key={i} onClick={()=>{a.fn();setMenuOpen(false);}} className="w-full text-left px-4 py-2.5 text-sm text-[#D8C3A5]/80 hover:text-white hover:bg-white/10 transition">{a.label}</button>
              ))}
            </div>
          )}
        </div>
      </header>

      <div className="pt-16">
        <div className="bg-gradient-to-b from-[#004030] to-[#004030]/80 dark:from-slate-900 dark:to-slate-900 px-4 sm:px-6 md:px-8 pt-10 pb-8">
          <div className="max-w-5xl mx-auto anim">
            <p className="text-[#D8C3A5]/60 text-[11px] font-bold uppercase tracking-widest mb-2">NTHU EMI · 2026.04.23</p>
            <h1 className="font-serif font-black text-[#D8C3A5] text-2xl sm:text-3xl md:text-4xl mb-1">{t.site_title}</h1>
            <p className="text-[#D8C3A5]/60 text-sm">{t.site_sub}</p>
            {spas.length>0&&(
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5">
                {[spas.length,new Set(spas.map(s=>s.deptLabel)).size,new Set(spas.map(s=>s.courseCategoryLabel)).size,uniqAuthors].map((v,i)=>(
                  <div key={i} className="bg-white/10 rounded-xl px-3 py-2.5 text-center">
                    <p className="font-serif font-black text-[#D8C3A5] text-2xl">{v}</p>
                    <p className="text-[#D8C3A5]/50 text-[10px] uppercase tracking-wider mt-0.5">{t.stat_labels[i]}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      <main className="flex-1 w-full max-w-5xl mx-auto px-4 sm:px-6 md:px-8 py-8 min-w-0">
        {(showUpload||spas.length===0)&&(
          <div className="mb-8 anim1">
            <DropZone t={t} onFiles={handleFiles}/>
            {spas.length===0&&<p className="text-center text-slate-400 dark:text-slate-500 text-sm mt-4">{t.start_hint}</p>}
          </div>
        )}
        {loading&&(
          <div className="flex items-center justify-center gap-3 py-8 text-[#004030] dark:text-[#D8C3A5]">
            <div className="w-5 h-5 border-2 border-current border-t-transparent rounded-full spin"/>
            <span className="text-sm font-semibold">{t.parsing}</span>
          </div>
        )}
        {spas.length>0&&(
          <>
            <div className="flex flex-wrap gap-3 items-end mb-5 anim2">
              <div className="flex-1 min-w-[150px]">
                <label className="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">{t.lbl_search}</label>
                <div className="relative">
                  <Ic n="search" size={14} cls="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.ph_search} className="w-full pl-8 pr-3 py-1.5 text-sm border border-slate-200 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-[#004030] dark:focus:ring-[#D8C3A5]"/>
                </div>
              </div>
              <Fsel label={t.lbl_dept} value={fDept||ALL} onChange={setFDept} options={allDepts}/>
              <Fsel label={t.lbl_course} value={fCourse||ALL} onChange={setFCourse} options={allCourses}/>
              <Fsel label={t.lbl_spec} value={fSpec||ALL} onChange={setFSpec} options={allSpecs}/>
              <div className="flex gap-1 items-end pb-0.5">
                {[['grid',t.lbl_grid],['list',t.lbl_list]].map(([m,lbl])=>(
                  <button key={m} onClick={()=>setViewMode(m)} title={lbl} className={`p-2 rounded-lg transition ${viewMode===m?'bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030]':'text-slate-400 hover:text-slate-600 border border-slate-200 dark:border-slate-600'}`}>
                    <Ic n={m} size={15}/>
                  </button>
                ))}
              </div>
            </div>
            <div className="flex items-center justify-between mb-4 anim3">
              <p className="text-sm text-slate-500 dark:text-slate-400 font-semibold">{t.lbl_count(filtered.length)}</p>
              {hasF&&<button onClick={()=>{setSearch('');setFDept('');setFCourse('');setFSpec('');}} className="text-xs text-[#004030] dark:text-[#D8C3A5] font-semibold hover:underline flex items-center gap-1"><Ic n="x" size={12}/>{t.btn_clear}</button>}
            </div>
            {filtered.length===0
              ?<div className="text-center py-20 anim"><p className="font-serif font-bold text-slate-400 dark:text-slate-500 text-xl mb-2">{t.empty_h}</p><p className="text-slate-300 dark:text-slate-600 text-sm">{t.empty_s}</p></div>
              :viewMode==='grid'
                ?<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">{filtered.map(s=><SPACard key={s.id} spa={s} t={t} viewMode="grid" onEdit={()=>setEditSpa(s)}/>)}</div>
                :<div className="flex flex-col gap-3">{filtered.map(s=><SPACard key={s.id} spa={s} t={t} viewMode="list" onEdit={()=>setEditSpa(s)}/>)}</div>
            }
          </>
        )}
      </main>

      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/50 text-[10px]">{t.ver} · {t.copy}</span>
        <span className="text-[#D8C3A5]/50 text-[10px] flex items-center gap-1">
          Architect:&nbsp;<a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a>
        </span>
      </footer>

      {editSpa&&<EditModal spa={editSpa} t={t} onSave={saveEdit} onClose={()=>setEditSpa(null)}/>}
      {showProfile&&<ProfileModal t={t} lang={lang} spas={spas} onClose={()=>setShowProfile(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
